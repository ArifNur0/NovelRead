{% extends 'base.html' %}

{% block title %}Login - Koleksi Novel{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-2">Login</h1>
    <p class="text-zinc-400 mb-6 text-sm">Masuk untuk mengelola koleksi novel PDF.</p>

    <form method="post" class="space-y-4">
      <div>
        <label class="text-sm text-zinc-300">Username</label>
        <input name="username" required class="mt-1 w-full rounded bg-zinc-900 border border-zinc-800 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>
      <div>
        <label class="text-sm text-zinc-300">Password</label>
        <input name="password" type="password" required class="mt-1 w-full rounded bg-zinc-900 border border-zinc-800 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500" />
      </div>

      <button type="submit" class="w-full rounded bg-blue-600 hover:bg-blue-500 px-4 py-2 font-semibold">Login</button>
    </form>

    <div class="mt-5 text-xs text-zinc-500 leading-relaxed">
      Belum punya akun? <a class="text-blue-400 hover:text-blue-300 font-semibold" href="{{ url_for('register') }}">Register</a>
    </div>

  </div>
{% endblock %}
