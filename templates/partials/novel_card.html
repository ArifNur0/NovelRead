<div class="rounded border border-zinc-800 bg-zinc-900/30 overflow-hidden">
  <div class="h-56 bg-zinc-950 flex items-center justify-center">
    <img src="{{ n.cover_path }}" alt="{{ n.title }}" class="max-h-full object-contain" />
  </div>
  <div class="p-3">
    <div class="font-semibold text-sm leading-snug">{{ n.title }}</div>
    {% if n.author %}
      <div class="text-xs text-zinc-400 mt-1">{{ n.author }}</div>
    {% endif %}

    <div class="mt-3 flex gap-2">
      <a href="{{ n.pdf_path }}" target="_blank" class="flex-1 text-center px-2 py-1 rounded bg-blue-600 hover:bg-blue-500 text-xs font-semibold">Baca</a>
<form action="{{ url_for('delete_novel_route', novel_id=n.id) }}" method="post" onsubmit="return confirm('Hapus novel ini?');" class="">



        <button type="submit" class="px-2 py-1 rounded bg-zinc-800 hover:bg-zinc-700 text-xs font-semibold">Hapus</button>
      </form>
    </div>
  </div>
</div>
