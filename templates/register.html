{% extends 'base.html' %}

{% block title %}Register - Koleksi Novel{% endblock %}

{% block content %}
  <div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold mb-2">Register</h1>
    <p class="text-zinc-400 mb-6 text-sm">Buat akun untuk mengelola koleksi novel.</p>

    <form method="post" class="space-y-4">
      <div>
        <label class="text-sm text-zinc-300">Username</label>
        <input
          name="username"
          required
          minlength="3"
          maxlength="50"
          class="mt-1 w-full rounded bg-zinc-900 border border-zinc-800 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <div>
        <label class="text-sm text-zinc-300">Password</label>
        <input
          name="password"
          type="password"
          required
          minlength="6"
          class="mt-1 w-full rounded bg-zinc-900 border border-zinc-800 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500"
        />
      </div>

      <button type="submit" class="w-full rounded bg-emerald-600 hover:bg-emerald-500 px-4 py-2 font-semibold">Buat Akun</button>
    </form>

    <div class="mt-5 text-xs text-zinc-500 leading-relaxed">
      Sudah punya akun? <a class="text-blue-400 hover:text-blue-300 font-semibold" href="{{ url_for('login') }}">Login</a>
    </div>
  </div>
{% endblock %}
